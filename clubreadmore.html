<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="findabookstyle.css">
    <link rel="stylesheet" href="clubreadmore.css">
</head>

<body class="instrument-serif-regular">
    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <i class="fa fa-book-open" style="color: #DEAF84; font-size: 3.5rem;"></i>
            <a class="text-white title" href="#">Lit Hub </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse " id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active text-white" aria-current="page" href="#About">ABOUT</a>
                    <a class="nav-link active text-white" aria-current="page" href="findabook.html">FIND A BOOK</a>
                    <a class="nav-link active text-white" aria-current="page" href="bloghomepage.html">BLOGS</a>
                    <a class="nav-link active text-white" aria-current="page" href="Loginpage.html">SIGN IN</a>
                    <button class="btn " type="button" onclick="window.location.href='Signuppage.html'">SIGN UP</button>

                </div>
            </div>
        </div>
    </nav><br>

    <a href="findabook.html" class="club-back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <!-- Main Page-->

    <div class="club-page">
        <!-- left side - club image -->
        <div class="club-thumbnail">
            <img class = "club-img" id="clubImage" src="" alt="Club Image">
        </div>
        <div class="club-info">
            <h1 class="club-title" id="clubTitle">Loading...</h1>
            <p class="club-sub" id="clubSub">#loading...</p>
            <hr class="club-divider">
            <!-- About -->
            <h3 class="about-club">About the Club</h3>
            <p class="club-summary" id="clubSummary">Loading</p>
            <!-- Members -->
             <div class="club-stats">
                <div class="club-stat">
                    <span id="clubMembers">0 members</span>
                </div>
                <div class="club-stat">
                    <span id="clubCurrentBook">Currently reading...</span>
                </div>
             </div>

             <button class="club-join-btn" id="joinBtn">Join Club</button>

        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h2 class="modal-title" id="modalTitle">Welcome!</h2>
            <p class="modal-message" id="modalMessage"> You've joined the club!</p>

            <p class="modal-member-num" id="modalMemberNum"></p>
            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="findabook.js"></script>
    <script src="clubreadmore.js"></script>
</body>
</html>
