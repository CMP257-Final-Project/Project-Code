<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="findabookstyle.css">
    <link rel="stylesheet" href="BookReadMore.css">
</head>

<body class="instrument-serif-regular">
    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <i class="fa fa-book-open" style="color: #DEAF84; font-size: 3.5rem;"></i>
            <a class="text-white title" href="#">Lit Hub </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse " id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active text-white" aria-current="page"  href="HomePage.html#About">ABOUT</a>
                    <a class="nav-link active text-white" aria-current="page" href="findabook.html">FIND A BOOK</a>
                    <a class="nav-link active text-white" aria-current="page" href="bloghomepage.html">BLOGS</a>
                    <a class="nav-link active text-white" aria-current="page" href="Loginpage.html">SIGN IN</a>
                    <button class="btn" type="button" onclick="window.location.href='Signuppage.html'">SIGN UP</button>

                </div>
            </div>
        </div>
    </nav><br>

    <a href="findabook.html" class="book-back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <!-- Main Page-->
    <div class="book-page">
        <div class="book-thumbnail">
            <img class="book-img" id="bookImage" src="" alt="book Image">
            <button class="btn-save">
                <i class="fas fa-heart"></i> Add to Wishlist
            </button>
        </div>
        <div class="book-info">
            <h1 class="book-title" id="bookTitle">Loading...</h1>
            <p class="book-sub" id="bookAuthor">loading...</p>
            <div class="star-rating mb-2" id="star"></div>

            <div class="book-meta">
                <div class="book-meta-item">
                    <i class="fas fa-book"></i>
                    <div id="pages"></div>
                </div>
                <div class="book-meta-item">
                    <i class="fas fa-tag"></i>
                    <div id="genre"><strong></strong><br>Genre</div>
                </div>
                <div class="book-meta-item">
                    <i class="fas fa-calendar"></i>
                    <div id="publishedDate"><strong></strong><br>Published</div>
                </div>
            </div>

            <!-- About -->
            <h3 class="about-book">About the Book</h3>
            <p class="book-summary" id="bookSummary">Loading</p>

            <div class="reviews-section">
                <h3><i class="fas fa-comments"></i> Reader Reviews</h3>
                <div id="reviews"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="findabook.js"></script>
    <script src="BookReadMore.js"></script>
</body>

</html>`
