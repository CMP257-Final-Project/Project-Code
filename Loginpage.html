<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quintessential&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="Signuplogin.css">
    <style>
        .login-row {
            align-items: center !important;
        }
        .login-card {
            height: auto !important;
        }
        .login-image-card {
            height: 100%;
        }
        .error-message {
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body class="instrument-serif-regular">
    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <i class="fa fa-book-open" aria-hidden="true"></i>
            <a class="text-white title" href="#">Lit Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse " id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active text-white" aria-current="page" href="#">ABOUT</a>
                    <a class="nav-link active text-white" aria-current="page" href="#">FIND A BOOK</a>
                    <a class="nav-link active text-white" aria-current="page" href="#">BLOGS</a>
                    <a class="nav-link active text-white" aria-current="page" href="#">SIGN UP</a>
                </div>
            </div>
        </div>
    </nav><br>

    <div class="container" style="max-width: 1050px;">
        <div class="row g-4 align-items-stretch login-row">
            <div class="col-md-6 d-flex">
                <div class="card login-card w-100">
                    <div class="card-header">
                        <h4>Login</h4>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="inputEmailUser" class="form-label">Email or Username</label>
                                <input type="text" class="form-control" id="inputEmailUser" placeholder="Enter email or username">
                                <div id="emailError" class="error-message text-danger"></div>
                            </div>
                            <div class="mb-3">
                                <label for="inputPassword" class="form-label">Password</label>
                                <input type="password" class="form-control" id="inputPassword" placeholder="Enter password">
                                <div id="passwordError" class="error-message text-danger"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Log In</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-5 d-flex">
                <div class="card h-100 overflow-hidden border-0 shadow-sm login-image-card w-100">
                    <img src="img/lib2.jpg" alt="Literary inspiration" class="img-fluid h-100 w-100 object-fit-cover" style="object-fit: cover; min-height: 100%;">
                </div>
            </div>
        </div>
    </div>

    <script>
        function validateEmailOrUsername(value) {
            if (value.trim() === "") {
                return "Email or Username is required";
            }
            
            if (value.includes("@")) {
                let emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(value)) {
                    return "Enter a valid email address";
                }
            } else {
                if (value.length < 3) {
                    return "Username must be at least 3 characters";
                }
                if (!/^[A-Za-z0-9_]+$/.test(value)) {
                    return "Username can only contain letters, numbers, and underscore";
                }
            }
            return "";
        }

        function validatePassword(password) {
            if (password === "") {
                return "Password is required";
            }
            if (password.length < 6) {
                return "Password must be at least 6 characters";
            }
            return "";
        }

        let emailInput = document.getElementById("inputEmailUser");
        let passwordInput = document.getElementById("inputPassword");

        emailInput.addEventListener("input", function() {
            let error = validateEmailOrUsername(this.value);
            document.getElementById("emailError").textContent = error;
            if (error) {
                this.classList.add("is-invalid");
                this.classList.remove("is-valid");
            } else {
                this.classList.add("is-valid");
                this.classList.remove("is-invalid");
            }
        });

        passwordInput.addEventListener("input", function() {
            let error = validatePassword(this.value);
            document.getElementById("passwordError").textContent = error;
            if (error) {
                this.classList.add("is-invalid");
                this.classList.remove("is-valid");
            } else {
                this.classList.add("is-valid");
                this.classList.remove("is-invalid");
            }
        });

        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            
            let emailUsername = emailInput.value;
            let password = passwordInput.value;
            
            let emailError = validateEmailOrUsername(emailUsername);
            let passwordError = validatePassword(password);
            
            document.getElementById("emailError").textContent = emailError;
            document.getElementById("passwordError").textContent = passwordError;
            
            if (!emailError && !passwordError) {
                alert("Login successful! Welcome back to Lit Hub!");
                this.reset();
                document.querySelectorAll(".form-control").forEach(input => {
                    input.classList.remove("is-valid", "is-invalid");
                });
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
